  <text x="300" y="118" font-family="system-ui" font-size="44" font-weight="800" fill="#0F172A">Marie Test</text>
  <text x="300" y="148" font-family="system-ui" font-size="14" fill="#64748B">Voici un aperçu de ton activité sur Sourcey.</text>

