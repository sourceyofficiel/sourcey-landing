  <text x="64" y="858" font-family="system-ui" font-size="12.5" font-weight="600" fill="#FFFFFF">Marie Test</text>
  <text x="64" y="874" font-family="system-ui" font-size="10.5" fill="#94A3B8">Plan PRO</text>

