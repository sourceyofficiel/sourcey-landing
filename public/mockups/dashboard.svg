  <text x="904" y="376" font-family="system-ui" font-size="14.5" font-weight="700" fill="#0F172A">Mes commandes</text>
  <text x="1446" y="376" font-family="system-ui" font-size="12" font-weight="600" fill="#2563EB" text-anchor="end">Voir tout →</text>

  <g font-family="system-ui">
    <text x="904" y="436" font-size="13" font-weight="700" fill="#0F172A">📋 Tote bag toile lourde 12oz</text>
    <text x="904" y="456" font-size="12" fill="#64748B">Devis 100u · Chen Mei · hier 19:41</text>
    <rect x="1340" y="416" width="80" height="26" rx="13" fill="#FEF3C7"/>
    <text x="1380" y="433" font-size="11" font-weight="700" fill="#92400E" text-anchor="middle">En cours</text>

    <text x="904" y="510" font-size="13" font-weight="700" fill="#0F172A">👕 T-shirt premium coton bio 220g</text>
    <text x="904" y="530" font-size="12" fill="#64748B">Sample · Chen Mei · hier 19:39</text>
    <rect x="1340" y="490" width="80" height="26" rx="13" fill="#FEF3C7"/>
    <text x="1380" y="507" font-size="11" font-weight="700" fill="#92400E" text-anchor="middle">En cours</text>
  </g>

  <!-- Actions rapides -->
  <text x="300" y="708" font-family="system-ui" font-size="11.5" font-weight="700" letter-spacing="1" fill="#94A3B8">ACTIONS RAPIDES</text>

  <g>
    <rect x="300" y="724" width="285" height="80" rx="16" fill="#EFF6FF"/>
    <text x="318" y="754" font-family="system-ui" font-size="13" font-weight="700" fill="#0F172A">✨ Trouver un agent</text>
    <text x="318" y="774" font-family="system-ui" font-size="11.5" fill="#64748B">Décris ton produit, l'IA matche en 5s</text>

    <rect x="595" y="724" width="285" height="80" rx="16" fill="#FEF3C7"/>
    <text x="613" y="754" font-family="system-ui" font-size="13" font-weight="700" fill="#0F172A">📦 Parcourir le catalogue</text>
    <text x="613" y="774" font-family="system-ui" font-size="11.5" fill="#64748B">15 produits déjà négociés</text>

    <rect x="890" y="724" width="285" height="80" rx="16" fill="#F3E8FF"/>
    <text x="908" y="754" font-family="system-ui" font-size="13" font-weight="700" fill="#0F172A">+ Booker un service</text>
    <text x="908" y="774" font-family="system-ui" font-size="11.5" fill="#64748B">Photoshoot, packaging, logo</text>

    <rect x="1185" y="724" width="285" height="80" rx="16" fill="#DCFCE7"/>
    <text x="1203" y="754" font-family="system-ui" font-size="13" font-weight="700" fill="#0F172A">🎧 Contacter le support</text>
    <text x="1203" y="774" font-family="system-ui" font-size="11.5" fill="#64748B">Réponse sous 2h</text>
  </g>
