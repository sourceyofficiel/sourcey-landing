    <circle cx="332" cy="226" r="16" fill="#EFF6FF"/>
    <text x="320" y="278" font-family="system-ui" font-size="34" font-weight="800" fill="#0F172A">0</text>
    <text x="320" y="298" font-family="system-ui" font-size="12" fill="#64748B">Messages non lus</text>

    <rect x="590" y="190" width="270" height="120" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="622" cy="226" r="16" fill="#FEF3C7"/>
    <text x="610" y="278" font-family="system-ui" font-size="34" font-weight="800" fill="#0F172A">2</text>
    <text x="610" y="298" font-family="system-ui" font-size="12" fill="#64748B">Commandes actives</text>

    <rect x="880" y="190" width="270" height="120" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="912" cy="226" r="16" fill="#DCFCE7"/>
    <text x="900" y="278" font-family="system-ui" font-size="34" font-weight="800" fill="#0F172A">3</text>
    <text x="900" y="298" font-family="system-ui" font-size="12" fill="#64748B">Agents en relation</text>

    <rect x="1170" y="190" width="300" height="120" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="1202" cy="226" r="16" fill="#F3E8FF"/>
    <text x="1190" y="278" font-family="system-ui" font-size="34" font-weight="800" fill="#0F172A">0€</text>
    <text x="1190" y="298" font-family="system-ui" font-size="12" fill="#64748B">Volume services HT</text>
  </g>

