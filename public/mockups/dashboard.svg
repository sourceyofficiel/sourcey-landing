    <text x="380" y="424" font-size="13" font-weight="700" fill="#0F172A">Li Wei</text>
    <text x="380" y="442" font-size="12" fill="#64748B">👋 Hello, présente-moi un peu ton parcours.</text>

    <circle cx="348" cy="484" r="18" fill="#FBCFE8"/>
    <text x="380" y="482" font-size="13" font-weight="700" fill="#0F172A">Chen Mei</text>
    <text x="380" y="500" font-size="12" fill="#64748B">Devis : Tote bag toile lourde 12oz</text>

    <circle cx="348" cy="542" r="18" fill="#FED7AA"/>
    <text x="380" y="540" font-size="13" font-weight="700" fill="#0F172A">Wang Jun</text>
    <text x="380" y="558" font-size="12" fill="#64748B">Yes, envoie-moi l'échantillon STP.</text>

    <circle cx="348" cy="600" r="18" fill="#2563EB"/>
    <text x="348" y="606" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle">S</text>
    <text x="380" y="598" font-size="13" font-weight="700" fill="#0F172A">Support Sourcey</text>
    <text x="380" y="616" font-size="12" fill="#64748B">Bien sûr, je regarde ça et te reviens.</text>
  </g>

  <!-- Orders panel -->
