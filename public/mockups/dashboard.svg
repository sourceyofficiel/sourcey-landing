  <rect x="0" y="0" width="260" height="900" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Logo block in sidebar (uses real mark) -->
  <image x="20" y="22" width="44" height="44" href="/logo/sourcey-mark.png" preserveAspectRatio="xMidYMid meet"/>
  <text x="72" y="50" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" font-weight="800" fill="#0F172A">Sourcey</text>

  <!-- Active nav item -->
  <rect x="16" y="96" width="228" height="40" rx="10" fill="#EFF6FF"/>
  <circle cx="34" cy="116" r="6" fill="#2563EB"/>
  <text x="52" y="122" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13.5" font-weight="600" fill="#1D4ED8">Tableau de bord</text>

  <!-- Other nav items -->
  <g font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13.5" fill="#64748B">
    <text x="52" y="166">Messagerie</text>
    <circle cx="34" cy="160" r="5" fill="#94A3B8"/>
    <text x="52" y="206">Mes commandes</text>
    <circle cx="34" cy="200" r="5" fill="#94A3B8"/>
    <text x="52" y="246">Sourcey Pulse</text>
    <circle cx="34" cy="240" r="5" fill="#94A3B8"/>
  </g>

  <text x="24" y="306" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="1" fill="#94A3B8">SOURCING</text>

  <g font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13.5" fill="#64748B">
    <text x="52" y="346">Catalogue</text>
    <circle cx="34" cy="340" r="5" fill="#94A3B8"/>
    <text x="52" y="386">Visual Search IA</text>
    <circle cx="34" cy="380" r="5" fill="#94A3B8"/>
    <text x="52" y="426">Brand Coach IA</text>
    <circle cx="34" cy="420" r="5" fill="#94A3B8"/>
    <text x="52" y="466">Annuaire agents</text>
    <circle cx="34" cy="460" r="5" fill="#94A3B8"/>
  </g>

  <!-- Promo card in sidebar -->
  <rect x="16" y="540" width="228" height="120" rx="14" fill="#EFF6FF"/>
  <text x="32" y="568" font-family="system-ui" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#2563EB">✨ SOURCEY IA</text>
  <text x="32" y="594" font-family="system-ui" font-size="12.5" font-weight="600" fill="#0F172A">Pas envie de chercher ?</text>
  <text x="32" y="612" font-family="system-ui" font-size="12.5" font-weight="600" fill="#0F172A">Décris ton besoin.</text>
  <text x="32" y="642" font-family="system-ui" font-size="12" font-weight="600" fill="#2563EB">Lancer Match IA →</text>

